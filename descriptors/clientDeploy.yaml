# Flower SuperNode headless Service（StatefulSet 必要）
apiVersion: v1
kind: Service
metadata:
  name: flower-client-headless
spec:
  clusterIP: None
  selector:
    app: flower-client

---

# Flower SuperNode with PVC
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: flower-client
  labels:
    app: flower-client
spec:
  serviceName: flower-client-headless   # 繫結 headless service，產生穩定 pod 名稱
  podManagementPolicy: Parallel         # 所有 pod 同時啟動（同 Deployment 行為）
  replicas: 5
  selector:
    matchLabels:
      app: flower-client
  template:
    metadata:
      labels:
        app: flower-client
    spec:
      initContainers:
        - name: cache-warmer
          image: kubeflower:latest
          imagePullPolicy: IfNotPresent
          workingDir: /app
          command: ["python3", "-c"]
          args:
            - |
              import sys
              sys.path.insert(0, '/app')
              from src.client import load_data_with_cache
              import os
              load_data_with_cache(os.environ.get('DATA_PATH', '/app/data'))
              print('[cache-warmer] done')
          resources:
            limits:
              memory: "6Gi"
              cpu: "2"
            requests:
              memory: "2Gi"
              cpu: "1"
          env:
            - name: DATA_PATH
              value: "/app/data"
            - name: CACHE_DIR
              value: "/app/cache"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NUM_CLIENTS
              value: "5"  # 與 pyproject.toml num_clients 同步，用於 IID partition 分割
          volumeMounts:
            - name: flower-cache
              mountPath: /app/cache
      containers:
        - name: kubeflower
          image: kubeflower:latest
          imagePullPolicy: IfNotPresent
          workingDir: /app
          command: ["flower-supernode"]
          args:
            - "--insecure"
            - "--superlink=service-server:9092"
          # GPU 資源需求
          resources:
            limits:
              # nvidia.com/gpu: 1
              memory: "8Gi"
              cpu: "4"
            requests:
              # nvidia.com/gpu: 1
              memory: "4Gi"
              cpu: "2"
          env:
            - name: DATA_PATH
              value: "/app/data" # image 裡的 data.csv 在這
            - name: CACHE_DIR
              value: "/app/cache" # PVC 掛這裡
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: FLWR_GRPC_MAX_TIMEOUT
              value: "3600"  # gRPC 連線逾時（秒），避免長輪訓練斷線
            - name: FLWR_GRPC_KEEPALIVE_TIME_MS
              value: "30000"  # 每 30 秒發一次 keepalive ping，維持連線活躍
            - name: FLWR_GRPC_KEEPALIVE_TIMEOUT_MS
              value: "10000"  # ping timeout 10 秒
            - name: FLWR_GRPC_MAX_RECONNECT_BACKOFF_MS
              value: "5000"   # 斷線重連最大 backoff 5 秒
            - name: NUM_CLIENTS
              value: "5"  # 與 pyproject.toml num_clients 同步，用於 IID partition 分割
          volumeMounts:
            - name: flower-cache
              mountPath: /app/cache
      volumes:
        - name: flower-cache
          persistentVolumeClaim:
            claimName: my-pvc
